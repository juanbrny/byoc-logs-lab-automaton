---
# =====================================================================
# VARIANT SELECTORS — the only two lines you touch to swap components.
# Each maps to a role (roles/<k8s_distro>, roles/storage_<s3_backend>)
# plus a contract vars file (vars/storage_<s3_backend>.yml).
# =====================================================================
k8s_distro: k3s            # future: rke2, kubeadm, ...
s3_backend: aistor         # aistor | seaweedfs | external

# Derived from the inventory — do NOT hardcode. The lab_node group must hold
# exactly one host (asserted in site.yml); ansible_host is its address, with
# the inventory name as fallback if the name itself is resolvable.
lab_node_name: "{{ groups['lab_node'][0] }}"
node_ip: "{{ hostvars[lab_node_name].ansible_host | default(lab_node_name) }}"

# --- k8s distro contract (defaults for k3s; a different distro role ---
# --- may need different values here)                                 ---
kubeconfig_local_path: "{{ playbook_dir }}/.kubeconfig/{{ k8s_distro }}-byoc.yaml"
ingress_flavor: traefik          # consumed by byoc_logs to pick ingress template
default_storage_class: local-path

# --- S3 inputs (backend-agnostic; every storage role must honor these) ---
s3_buckets:
  - byocdata
  - pgsqlbackups
s3_region: us-east-1
# --- S3 credential flow (see README "Credential flow") ---
# Storage roles PUBLISH the app credentials; downstream roles CONSUME them.
# The desired keys for backends that let you choose (aistor, seaweedfs) live in
# the vaulted secrets.yml as s3_app_access_key / s3_app_secret_key. Backends
# that generate or are handed credentials (external, a future rook) publish
# whatever they got. Either way the result lands here:
s3_credentials_secret: byoc-s3-credentials

# Skip TLS verification on S3 (adds `mc --insecure`). Needed for self-signed
# certs; ignored when the scheme is http.
s3_tls_skip_verify: false
# Appended to every `mc` call. Empty unless we're on https with a cert mc
# wouldn't trust anyway.
mc_opts: "{{ '--insecure' if (s3_scheme == 'https' and s3_tls_skip_verify | bool) else '' }}"

# --- Per-backend INPUTS -------------------------------------------------
# Each backend takes its own <backend>_s3_* inputs and maps them onto the
# neutral contract keys in vars/storage_<backend>.yml. Only the block for the
# active s3_backend is used.

# backend: aistor
# http|https. https makes the operator issue a self-signed cert (autoCert),
# so it needs s3_tls_skip_verify: true as well.
aistor_s3_scheme: http

# backend: seaweedfs
# http only for now — the chart's TLS wiring is not implemented in this repo.
# The role asserts this rather than silently serving plaintext on an https URL.
seaweedfs_s3_scheme: http

# backend: external
# An S3 store this playbook does NOT manage (existing MinIO, StorageGRID, ECS,
# Rook/Ceph RGW, real AWS S3). Buckets in s3_buckets must already exist unless
# external_s3_create_buckets is true. Credentials go in the vaulted secrets.yml.
external_s3_scheme: https
external_s3_host: CHANGE_ME
external_s3_port: 443
external_s3_force_path_style: true     # false for real AWS S3
external_s3_namespace: byoc-s3         # ns for the mc pods + credentials Secret

# --- Datadog ---
datadog_site: datadoghq.eu
cluster_name: "{{ k8s_distro }}-byoc"

# --- CloudNativePG ---
cnpg_namespace: datadogdb
cnpg_cluster_name: datadog-postgres-cluster
cnpg_instances: 3                # single-node lab: all 3 share one disk
cnpg_storage_size: 1Gi
cnpg_backup_bucket: pgsqlbackups
cnpg_backup_schedule: "0 */6 * * *"

# --- BYOC Logs (CloudPrem) ---
byoc_namespace: byoc-logs
byoc_data_bucket: byocdata
byoc_index_root_uri: "s3://byocdata/indexes"
byoc_pod_size: xlarge
byoc_indexer_pv_size: 5Gi
