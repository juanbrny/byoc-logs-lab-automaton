---
# Full environment: node prep + k8s distro, then everything in-cluster.
# Re-runnable end to end. Useful tag subsets:
#   ansible-playbook site.yml -t distro
#   ansible-playbook site.yml -t storage,database
#   ansible-playbook site.yml -t byoc,verify

- name: Provision the k8s distro on the lab node
  hosts: lab_node
  become: true
  tasks:
    - name: Preflight — VM meets the documented spec
      ansible.builtin.include_role:
        name: preflight
        apply:
          tags: [preflight]
      tags: [preflight]

    # include_role (not roles:) so the role name can come from group_vars
    - name: Run distro role '{{ k8s_distro }}'
      ansible.builtin.include_role:
        name: "{{ k8s_distro }}"
        apply:
          tags: [distro]
      tags: [distro]

# Runs on whichever host the inventory puts in k8s_control:
#   localhost  -> workstation drives the cluster over the network (SSH labs)
#   the node   -> everything executes on the instance (AWS/SSM, no inbound)
# kubeconfig, privilege and tooling all follow from that one choice.
- name: Deploy the BYOC Logs prerequisite stack + BYOC Logs
  hosts: k8s_control
  gather_facts: true
  become: "{{ k8s_control_on_node }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
    K8S_AUTH_KUBECONFIG: "{{ kubeconfig_path }}"
  pre_tasks:
    - name: Load the storage backend contract (endpoint, namespace, quirks)
      ansible.builtin.include_vars: "vars/storage_{{ s3_backend }}.yml"
      tags: [always]

    - name: Look for the secrets file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/group_vars/all/secrets.yml"
      register: secrets_file
      tags: [always]

    - name: Explain how to create it if missing
      ansible.builtin.assert:
        that: secrets_file.stat.exists
        fail_msg: >-
          group_vars/all/secrets.yml does not exist. Create it from the template:
          cp group_vars/all/secrets.yml.example group_vars/all/secrets.yml &&
          $EDITOR group_vars/all/secrets.yml &&
          ansible-vault encrypt group_vars/all/secrets.yml
        quiet: true
      tags: [always]

    - name: Assert the inventory defines exactly one lab node
      ansible.builtin.assert:
        that:
          - groups['lab_node'] | default([]) | length == 1
        fail_msg: >-
          inventory/hosts.yml must define exactly one host under lab_node —
          node_ip is derived from it. If you have not created it yet:
          cp inventory/hosts.yml.example inventory/hosts.yml
      tags: [always]

    - name: Assert the inventory defines exactly one k8s_control host
      ansible.builtin.assert:
        that:
          - groups['k8s_control'] | default([]) | length == 1
        fail_msg: >-
          inventory/hosts.yml must define exactly one host under k8s_control —
          either 'localhost' (workstation drives the cluster; needs network
          access to the API server) or the same host as lab_node (everything
          runs on the node; required for AWS/SSM). See
          inventory/hosts-ssm.yml.example.
      tags: [always]

    - name: Refuse to run with placeholder secrets
      ansible.builtin.assert:
        that:
          - datadog_api_key != "CHANGE_ME"
          - s3_app_access_key != "CHANGE_ME" or s3_backend == "external"
          - s3_app_secret_key != "CHANGE_ME" or s3_backend == "external"
          - aistor_license != "CHANGE_ME" or s3_backend != "aistor"
          - seaweedfs_admin_secret_key != "CHANGE_ME" or s3_backend != "seaweedfs"
        fail_msg: >-
          Placeholder values still present. Fill them in with:
          ansible-vault edit group_vars/all/secrets.yml
      tags: [always]
  tasks:
    - name: Install kubectl/helm/python tooling on the node
      when: k8s_control_on_node
      ansible.builtin.include_role:
        name: k8s_tooling
        apply:
          tags: [tooling]
      tags: [tooling]

    - name: Datadog operator + agent
      ansible.builtin.include_role:
        name: datadog_agent
        apply:
          tags: [datadog]
      tags: [datadog]

    - name: S3 storage backend '{{ s3_backend }}'
      ansible.builtin.include_role:
        name: "storage_{{ s3_backend }}"
        apply:
          tags: [storage]
      tags: [storage]

    - name: Resolve S3 credentials published by the storage backend
      ansible.builtin.include_role:
        name: s3_credentials
        apply:
          tags: [database, byoc, verify]
      tags: [database, byoc, verify]

    - name: PostgreSQL (CloudNativePG) with WAL archiving
      ansible.builtin.include_role:
        name: cnpg
        apply:
          tags: [database]
      tags: [database]

    - name: BYOC Logs (CloudPrem) + ingress
      ansible.builtin.include_role:
        name: byoc_logs
        apply:
          tags: [byoc]
      tags: [byoc]

    - name: End-to-end verification
      ansible.builtin.include_role:
        name: verify
        apply:
          tags: [verify]
      tags: [verify]
