---
aistor_helm_repo: https://helm.min.io/
aistor_operator_namespace: aistor
aistor_release_name: primary-object-store
aistor_console_nodeport: 31000   # console only; the S3 NodePort is
                                 # s3_nodeport, in the contract file
# The ObjectStore CR name (set by OUR helm values). Distinct from
# s3_service_name, which the OPERATOR chooses and has renamed between
# versions. Never use one where the other is meant.
aistor_objectstore_name: myminio
aistor_root_user: minio
# aistor_root_password comes from the vaulted secrets.yml
aistor_green_retries: 60
aistor_green_delay: 5
