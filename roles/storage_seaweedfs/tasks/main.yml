---
# The chart can do TLS, but this repo does not wire the certs. Fail loudly
# instead of advertising https while the gateway serves plaintext.
- name: Assert the scheme matches what this role actually deploys
  ansible.builtin.assert:
    that: s3_scheme == "http"
    fail_msg: >-
      seaweedfs_s3_scheme=https is not implemented — the chart's TLS wiring is
      not in this repo. Use http, or point s3_backend at 'external' with a
      TLS-terminated SeaweedFS you manage yourself.
    quiet: true

- name: Add SeaweedFS helm repo
  kubernetes.core.helm_repository:
    name: seaweedfs
    repo_url: "{{ seaweedfs_helm_repo }}"
    force_update: true

- name: Create storage namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ s3_namespace }}"

# SeaweedFS has no `mc admin` equivalent — S3 identities are declared in a
# JSON config the gateway reads at startup. So the scoped app key is created
# HERE, at deploy time, rather than provisioned afterwards like AIStor's.
- name: Create S3 identities secret (admin + app key scoped to the buckets)
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: seaweedfs-s3-identities
        namespace: "{{ s3_namespace }}"
      type: Opaque
      stringData:
        seaweedfs_s3_config: "{{ lookup('template', 's3-config.json.j2') | from_json | to_json }}"

- name: Deploy SeaweedFS (master + volume + filer + s3 gateway)
  kubernetes.core.helm:
    name: "{{ seaweedfs_release_name }}"
    chart_ref: seaweedfs/seaweedfs
    chart_version: "{{ seaweedfs_chart_version }}"
    release_namespace: "{{ s3_namespace }}"
    update_repo_cache: true
    values: "{{ lookup('template', 'seaweedfs-values.yaml.j2') | from_yaml }}"
    wait: true
    wait_timeout: 600s

# CONTRACT GUARD: assert the service the contract promises actually exists
# before anything tries to resolve it. Turns a chart rename into a clear
# failure here instead of an NXDOMAIN three layers away.
- name: Assert the contract's S3 service exists
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Service
    name: "{{ s3_service_name }}"
    namespace: "{{ s3_namespace }}"
  register: s3_svc
  until: s3_svc.resources | length > 0
  retries: 12
  delay: 5
  failed_when: s3_svc.resources | length == 0

- name: Wait for the S3 gateway to have ready endpoints
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Endpoints
    name: "{{ s3_service_name }}"
    namespace: "{{ s3_namespace }}"
  register: s3_eps
  until: (s3_eps.resources[0].subsets | default([]) | length) > 0
  retries: 24
  delay: 5

# Same probe-first idempotency as AIStor: verify the outcome, provision only
# when the verdict says it's missing, then re-probe as the real verdict.
- name: Probe bucket access with the app key
  vars:
    mc_app_url: "{{ s3_scheme }}://{{ s3_app_access_key }}:{{ s3_app_secret_key }}@{{ s3_host }}:{{ s3_port }}"
  ansible.builtin.command:
    cmd: >
      kubectl run mc-verify --rm -i --restart=Never
      -n {{ s3_namespace }} --image=quay.io/minio/mc:latest
      --env=MC_HOST_s3={{ mc_app_url }}
      --command -- sh -s
    stdin: "{{ lookup('template', playbook_dir + '/templates/mc_verify.sh.j2') }}"
  register: s3_probe
  failed_when: false
  changed_when: false
  retries: 3
  delay: 10
  until: "'no such host' not in (s3_probe.stderr | default(''))"

- name: Create buckets + re-verify
  when: "'RESULT: PASS' not in s3_probe.stdout"
  block:
    - name: Create buckets with the admin identity
      vars:
        adm_creds: "{{ seaweedfs_admin_access_key }}:{{ seaweedfs_admin_secret_key }}"
        adm_url: "{{ s3_scheme }}://{{ adm_creds }}@{{ s3_host }}:{{ s3_port }}"
      ansible.builtin.command:
        cmd: >
          kubectl run mc-mkbucket --rm -i --restart=Never
          -n {{ s3_namespace }} --image=quay.io/minio/mc:latest
          --env=MC_HOST_adm={{ adm_url }}
          --command -- sh -s
        stdin: "{{ lookup('template', playbook_dir + '/templates/mc_make_buckets.sh.j2') }}"
      register: sw_buckets
      changed_when: "'BUCKETS: DONE' in sw_buckets.stdout"
      retries: 3
      delay: 10
      until: sw_buckets is succeeded

    - name: Re-probe bucket access (must PASS now)
      vars:
        mc_app_url: "{{ s3_scheme }}://{{ s3_app_access_key }}:{{ s3_app_secret_key }}@{{ s3_host }}:{{ s3_port }}"
      ansible.builtin.command:
        cmd: >
          kubectl run mc-verify --rm -i --restart=Never
          -n {{ s3_namespace }} --image=quay.io/minio/mc:latest
          --env=MC_HOST_s3={{ mc_app_url }}
          --command -- sh -s
        stdin: "{{ lookup('template', playbook_dir + '/templates/mc_verify.sh.j2') }}"
      register: s3_verify
      failed_when: "'RESULT: PASS' not in s3_verify.stdout"
      changed_when: false

- name: Publish the S3 credential contract
  ansible.builtin.include_role:
    name: s3_credentials
    tasks_from: publish
  vars:
    s3_publish_access_key: "{{ s3_app_access_key }}"
    s3_publish_secret_key: "{{ s3_app_secret_key }}"

- name: Show S3 contract for downstream roles
  ansible.builtin.debug:
    msg:
      - "backend: seaweedfs"
      - "endpoint (in-cluster): {{ s3_endpoint }}"
      - "endpoint (external):   {{ s3_endpoint_external }}"
      - "path-style: {{ s3_force_path_style }} | region: {{ s3_region }}"
      - "buckets: {{ s3_buckets | join(', ') }}"
