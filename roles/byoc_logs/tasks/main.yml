---
- name: Create BYOC namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ byoc_namespace }}"

- name: Create Datadog API key secret in BYOC namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: datadog-secret
        namespace: "{{ byoc_namespace }}"
      type: Opaque
      stringData:
        api-key: "{{ datadog_api_key }}"

# --- Metastore URI: pull CNPG's ready-made URI (password already
# --- URL-encoded), FQDN-ify the -rw host, normalize the scheme.
- name: Read CNPG app secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ cnpg_cluster_name }}-app"
    namespace: "{{ cnpg_namespace }}"
  register: cnpg_app_secret
  failed_when: cnpg_app_secret.resources | length == 0

- name: Build cross-namespace metastore URI
  ansible.builtin.set_fact:
    qw_metastore_uri: >-
      {{ (cnpg_app_secret.resources[0].data.uri | b64decode)
         | replace('@' + rw_short + ':', '@' + rw_short + '.' + cnpg_namespace + '.svc.cluster.local:')
         | regex_replace('^postgresql://', 'postgres://') }}
  vars:
    rw_short: "{{ cnpg_app_secret.resources[0].data.host | b64decode }}"

- name: Create metastore URI secret
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: byoc-logs-metastore-uri
        namespace: "{{ byoc_namespace }}"
      type: Opaque
      stringData:
        QW_METASTORE_URI: "{{ qw_metastore_uri }}"

- name: Create S3 credentials secret for BYOC components
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: byoc-logs-minio-credentials
        namespace: "{{ byoc_namespace }}"
      type: Opaque
      stringData:
        AWS_ACCESS_KEY_ID: "{{ s3_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ s3_secret_key }}"

- name: Add Datadog helm repo
  kubernetes.core.helm_repository:
    name: datadog
    repo_url: https://helm.datadoghq.com

- name: Install BYOC Logs (CloudPrem) chart
  kubernetes.core.helm:
    name: "{{ byoc_release_name }}"
    chart_ref: datadog/cloudprem
    release_namespace: "{{ byoc_namespace }}"
    update_repo_cache: true
    values: "{{ lookup('template', 'datadog-values.yaml.j2') | from_yaml }}"

- name: Apply ingress for flavor '{{ ingress_flavor }}'
  ansible.builtin.include_tasks: "ingress_{{ ingress_flavor }}.yml"
